  ethnicity:
    name: ethnicity
    description: "Ethnicity is a 'multi-dimensional concept referring to community belonging and a shared cultural group membership.\nIt is related to sociodemographic characteristics, including language, religion, geographic origin, nationality, cultural traditions, ancestry and migration history, among others,'\n[REF: Canadian Institute for Health Information. Guidance on the Use of Standards for Race-Based and Indigenous Identity Data Collection and Health Reporting in Canada (2022)][REF: Canadian Institute for Health Information.Guidance on the Use of Standards for Race-Based and Indigenous Identity Data Collection and Health Reporting in Canada.(2022)](https://www.cihi.ca/sites/default/files/document/guidance-and-standards-for-race-based-and-indigenous-identity-data-en.pdf).\nParticipants may have multiple ethnic and/or cultural identities.\nAll categories entered by the participants should be reported."
    title: Ethnicity
    notes: '

      "PCGL guidance documents provide further detail (e.g., PCGL Reference Survey
      v1.0, and PCGL Guidance Document for Participant Sociodemographic Data v1.0)


      To include multiple values, separate values with a pipe delimiter ''|'' within
      your file."

      '
    comments:
    - EDI indicator
    exact_mappings:
    - PCGL.Reference.Survey.v1.0.and.PCGL.Guidance.Document.for.Participant.Sociodemographic.Data.v1.0
    range: ethnicity_menu
    required: true
    multivalued: true
  gender:
    name: gender
    description: "Gender refers to the socially constructed roles, behaviours, expressions and identities of girls, women, boys, men, and gender diverse people.\nA person’s gender may be the same as or different from their assigned sex at birth and may change over time."
    title: Gender
    notes: '

      PCGL guidance documents provide further detail (e.g., PCGL Reference Survey
      v1.0, and PCGL Guidance Document for Participant Sociodemographic Data v1.0)

      '
    comments:
    - EDI indicator
    exact_mappings:
    - PCGL.Reference.Survey.v1.0.and.PCGL.Guidance.Document.for.Participant.Sociodemographic.Data.v1.0
    - Phenopackets.v2.0:Individual.gender
    range: gender_menu
    required: true
  race:
    name: race
    description: "Race is a social construct used to judge and categorize people based on perceived differences in physical appearance in ways that create and maintain power differentials within social hierarchies.\nThere is no scientifically supported biological basis for discrete racial groups\n[REF: Canadian Institute for Health Information.Guidance on the Use of Standards for Race-Based and Indigenous Identity Data Collection and Health Reporting in Canada. (2022)](https://www.cihi.ca/sites/default/files/document/guidance-and-standards-for-race-based-and-indigenous-identity-data-en.pdf).\nParticipants may have multiple racial identities.\nAll categories selected by the participants should be reported."
    title: Race
    comments:
    - EDI indicator
    exact_mappings:
    - PCGL.Reference.Survey.v1.0.and.PCGL.Guidance.Document.for.Participant.Sociodemographic.Data.v1.0
    range: race_menu
    required: true
    multivalued: true
  sex_at_birth:
    name: sex_at_birth
    description: "Sex is a biological concept that has been historically defined solely based on external anatomy; however, sex is also influenced by our physiology, genes, and hormones."
